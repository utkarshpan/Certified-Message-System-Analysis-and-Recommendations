<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Published! - CMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 40px;
        }
        .success-header i { font-size: 80px; margin-bottom: 20px; display: block; }
        .body { padding: 40px; }
        .message-preview {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-style: italic;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-outline {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }
        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .share-btn {
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            border: none;
        }
        .twitter { background: #1DA1F2; }
        .whatsapp { background: #25D366; }
        .facebook { background: #4267B2; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <script src="config.js"></script>
    <div class="container">
        <div class="card">
            <div class="success-header">
                <i>✓</i>
                <h1>Published Successfully!</h1>
                <p>Your verified message is now live</p>
            </div>
            <div class="body">
                <div class="message-preview" id="messagePreview">Loading...</div>
                
                <div class="share-buttons">
                    <button class="share-btn twitter" onclick="shareToTwitter()">🐦 Twitter</button>
                    <button class="share-btn whatsapp" onclick="shareToWhatsApp()">💬 WhatsApp</button>
                    <button class="share-btn facebook" onclick="shareToFacebook()">📘 Facebook</button>
                </div>
                
                <div>
                    <button class="btn btn-primary" onclick="location.href='dashboard.html'">Go to Dashboard</button>
                    <button class="btn btn-outline" onclick="location.href='submit-message.html'">Create Another</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';
        
        // Read from lastValidatedMessage (set by publish button in validate-simple.html)
        // Fall back to 'message' key as backup
        const message = localStorage.getItem('lastValidatedMessage') || localStorage.getItem('message');
        const category = localStorage.getItem('category');
        document.getElementById('messagePreview').innerHTML = `"${message || 'Your verified message'}"`;
        
        function getShareText() {
            return `✅ AI-VERIFIED: "${message}"\n\n🔍 Verified by Certified Message System\n📊 Credibility Score: High\n🏷️ Category: ${category || 'General'}\n\n#FakeNewsDetection #VerifiedMessage #CMS`;
        }
        
        function shareToTwitter() {
            const text = getShareText();
            const url = window.location.href;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank', 'width=600,height=400');
            showToast('Opening Twitter...');
        }
        
        function shareToWhatsApp() {
            const text = getShareText();
            window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + window.location.href)}`, '_blank');
            showToast('Opening WhatsApp...');
        }
        
        function shareToFacebook() {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank', 'width=600,height=400');
            showToast('Opening Facebook...');
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
    <!-- config.js already loaded at top of body -->
</body>
</html>
