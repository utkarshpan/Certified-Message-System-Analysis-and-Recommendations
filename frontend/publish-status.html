<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Published! | Certified Message System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 20px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        /* Main Card */
        .success-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .success-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .success-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .check-icon {
            font-size: 80px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            animation: scale 0.5s ease-out;
        }

        @keyframes scale {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .success-header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .success-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            position: relative;
            z-index: 1;
        }

        /* Body */
        .success-body {
            padding: 40px;
        }

        /* Message Preview */
        .message-preview {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .message-preview::before {
            content: '“';
            position: absolute;
            top: -15px;
            left: 15px;
            font-size: 60px;
            color: #667eea;
            opacity: 0.3;
            font-family: serif;
        }

        .message-preview::after {
            content: '”';
            position: absolute;
            bottom: -25px;
            right: 15px;
            font-size: 60px;
            color: #667eea;
            opacity: 0.3;
            font-family: serif;
        }

        .message-text {
            font-size: 18px;
            line-height: 1.6;
            color: #333;
            font-style: italic;
        }

        .badge-verified {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            margin-top: 15px;
        }

        /* Share Section */
        .share-section {
            margin-bottom: 30px;
        }

        .share-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .share-title i {
            color: #667eea;
            margin-right: 8px;
        }

        .share-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .share-btn {
            padding: 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .share-btn i {
            font-size: 28px;
        }

        .share-btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.1);
        }

        .share-twitter {
            background: #1DA1F2;
            box-shadow: 0 5px 15px rgba(29, 161, 242, 0.3);
        }

        .share-facebook {
            background: #4267B2;
            box-shadow: 0 5px 15px rgba(66, 103, 178, 0.3);
        }

        .share-whatsapp {
            background: #25D366;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .share-linkedin {
            background: #0077B5;
            box-shadow: 0 5px 15px rgba(0, 119, 181, 0.3);
        }

        /* Copy Link Section */
        .copy-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .copy-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 12px;
            background: white;
            font-family: monospace;
        }

        .copy-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 600px) {
            .share-grid { grid-template-columns: repeat(2, 1fr); }
            .success-header h1 { font-size: 24px; }
            .success-body { padding: 25px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Confetti Animation -->
    <div class="confetti" id="confetti"></div>

    <div class="container">
        <div class="success-card">
            <div class="success-header">
                <div class="check-icon">✓</div>
                <h1>Published Successfully!</h1>
                <p>Your verified message is now live</p>
            </div>
            <div class="success-body">
                <!-- Message Preview -->
                <div class="message-preview">
                    <div class="message-text" id="messagePreview">Loading...</div>
                    <div class="badge-verified">
                        <i class="fas fa-check-circle"></i> AI Verified
                    </div>
                </div>

                <!-- Share Section -->
                <div class="share-section">
                    <div class="share-title">
                        <i class="fas fa-share-alt"></i> Share to Social Media
                    </div>
                    <div class="share-grid">
                        <button class="share-btn share-twitter" onclick="shareToTwitter()">
                            <i class="fab fa-twitter"></i>
                            <span>Twitter</span>
                        </button>
                        <button class="share-btn share-facebook" onclick="shareToFacebook()">
                            <i class="fab fa-facebook-f"></i>
                            <span>Facebook</span>
                        </button>
                        <button class="share-btn share-whatsapp" onclick="shareToWhatsApp()">
                            <i class="fab fa-whatsapp"></i>
                            <span>WhatsApp</span>
                        </button>
                        <button class="share-btn share-linkedin" onclick="shareToLinkedIn()">
                            <i class="fab fa-linkedin-in"></i>
                            <span>LinkedIn</span>
                        </button>
                    </div>
                </div>

                <!-- Copy Link Section -->
                <div class="copy-section">
                    <input type="text" id="shareLink" class="copy-input" readonly value="https://cms.app/message/verified">
                    <button class="copy-btn" onclick="copyLink()">
                        <i class="fas fa-copy"></i> Copy
                    </button>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button onclick="location.href='dashboard.html'" class="btn btn-primary">
                        <i class="fas fa-chart-line"></i> Go to Dashboard
                    </button>
                    <button onclick="location.href='submit-message.html'" class="btn btn-outline">
                        <i class="fas fa-plus"></i> Create Another
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get the verified message from localStorage
        const message = localStorage.getItem('message');
        const category = localStorage.getItem('category');
        
        document.getElementById('messagePreview').innerHTML = message || 'Your verified message';
        
        // Get user info
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        // Function to create share text
        function getShareText() {
            return `✅ AI-VERIFIED: "${message}"\n\n🔍 Verified by Certified Message System\n📊 Credibility Score: High\n🏷️ Category: ${category || 'General'}\n\n#FakeNewsDetection #VerifiedMessage #CMS`;
        }
        
        // Function to get current page URL
        function getCurrentUrl() {
            return window.location.href;
        }
        
        // Twitter Share
        function shareToTwitter() {
            const text = getShareText();
            const url = getCurrentUrl();
            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
            window.open(twitterUrl, '_blank', 'width=600,height=400');
            showToast('Opening Twitter...');
        }
        
        // Facebook Share
        function shareToFacebook() {
            const url = getCurrentUrl();
            const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
            window.open(facebookUrl, '_blank', 'width=600,height=400');
            showToast('Opening Facebook...');
        }
        
        // WhatsApp Share
        function shareToWhatsApp() {
            const text = getShareText();
            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + getCurrentUrl())}`;
            window.open(whatsappUrl, '_blank');
            showToast('Opening WhatsApp...');
        }
        
        // LinkedIn Share
        function shareToLinkedIn() {
            const url = getCurrentUrl();
            const title = encodeURIComponent('AI-Verified Message');
            const summary = encodeURIComponent(message.substring(0, 200));
            const linkedinUrl = `https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(url)}&title=${title}&summary=${summary}`;
            window.open(linkedinUrl, '_blank', 'width=600,height=500');
            showToast('Opening LinkedIn...');
        }
        
        // Copy Link Function
        function copyLink() {
            const linkInput = document.getElementById('shareLink');
            linkInput.select();
            document.execCommand('copy');
            showToast('Link copied to clipboard! 📋');
        }
        
        // Show Toast Notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Create Confetti Animation
        function createConfetti() {
            const confettiContainer = document.getElementById('confetti');
            for (let i = 0; i < 100; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.animationDelay = Math.random() * 3 + 's';
                piece.style.animationDuration = Math.random() * 2 + 2 + 's';
                piece.style.background = `hsl(${Math.random() * 360}, 70%, 50%)`;
                piece.style.width = Math.random() * 8 + 4 + 'px';
                piece.style.height = Math.random() * 12 + 6 + 'px';
                confettiContainer.appendChild(piece);
            }
        }
        
        // Check authentication
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // Create confetti on load
        createConfetti();
        
        // Update share link with actual message ID (you can generate a unique ID)
        const messageId = Date.now();
        document.getElementById('shareLink').value = `https://cms.app/message/${messageId}`;
    </script>
</body>
</html>
