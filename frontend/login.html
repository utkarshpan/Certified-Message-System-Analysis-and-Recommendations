<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Certified Message System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .switch-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
            font-size: 14px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <script src="config.js"></script>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🔐 Certified Message System</h1>
                <p>AI-Powered Fake News Detection</p>
            </div>
            <div class="body">
                <div id="message" style="display: none;"></div>
                
                <form id="authForm">
                    <div id="nameGroup" class="form-group" style="display: none;">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name">
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn btn-primary">Sign In</button>
                </form>
                
                <div class="switch-link">
                    <span id="switchText">Don't have an account?</span>
                    <a href="#" id="switchMode">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            verifyToken(token);
        }
        
        async function verifyToken(token) {
            try {
                const response = await fetch(`${window.API_URL}/api/auth/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.valid) {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.log('Not logged in');
            }
        }
        
        function showMessage(text, isError = true) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = isError ? 'error-message' : 'success-message';
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        document.getElementById('switchMode').addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            
            const nameGroup = document.getElementById('nameGroup');
            const submitBtn = document.getElementById('submitBtn');
            const switchText = document.getElementById('switchText');
            const switchLink = document.getElementById('switchMode');
            
            if (isLoginMode) {
                nameGroup.style.display = 'none';
                submitBtn.textContent = 'Sign In';
                switchText.textContent = "Don't have an account?";
                switchLink.textContent = 'Sign Up';
            } else {
                nameGroup.style.display = 'block';
                submitBtn.textContent = 'Create Account';
                switchText.textContent = "Already have an account?";
                switchLink.textContent = 'Sign In';
            }
        });
        
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            
            if (!email || !password) {
                showMessage('Please fill all fields');
                return;
            }
            
            if (!isLoginMode && (!name || password.length < 6)) {
                showMessage('Name required & password must be at least 6 characters');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Processing...';
            
            try {
                const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/signup';
                const body = isLoginMode ? { email, password } : { name, email, password };
                
                const response = await fetch(`${window.API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMessage(isLoginMode ? 'Login successful!' : 'Account created!', false);
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showMessage(data.error || 'Authentication failed');
                }
                
            } catch (error) {
                showMessage('Connection error. Make sure backend is running.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = isLoginMode ? 'Sign In' : 'Create Account';
            }
        });
    </script>
    <!-- config.js already loaded at top of body -->
</body>
</html>
